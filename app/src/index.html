<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>GymTracker</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#161819">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Lexend:wght@500;600;700&display=swap" rel="stylesheet">
    <script>
      try {
        if ((localStorage.getItem('tema') || 'dark') === 'dark') {
          document.documentElement.classList.add('theme-dark');
        }
      } catch (e) {}
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function () {});
        });
      }
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
